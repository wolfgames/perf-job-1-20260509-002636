# pipeline-context.yml — LLM-friendly project snapshot
# Generated by pipeline-build-game phase 10 (prime).
# Keeps shared context in one place so each phase doesn't re-discover the project.
# Update after significant structural changes.

# Aliases — concrete values substituted into the glossary template at dispatch
# time so sub-agents never guess paths or detect runners. Populated by:
#   initRun()     — runDir, pass, skillRoot, repoRoot, rules, tsRunner
#   05-pass-gate  — previousRunLog
#   10-prime      — buildCmd, testCmd
# Derived aliases ($pipelineRoot, $phasesDir, $refs, …) are computed from these
# anchors inside $refs/templates/glossary.tpl.md — they are NOT duplicated here.
aliases:
  runDir: /tmp/workspace/perf-job-1-20260509-002636/pipeline/runs/run-01
  pass: core
  skillRoot: /tmp/workspace/perf-job-1-20260509-002636/.claude/skills/pipeline-build-game
  repoRoot: /tmp/workspace/perf-job-1-20260509-002636
  rules: /tmp/workspace/perf-job-1-20260509-002636/.claude/rules
  tsRunner: bun
  previousRunLog: null
  buildCmd: "bun run build"
  testCmd: "bun test"

# Pass context — mirrored by phase 10 (prime) from $runLog.pass and
# $phaseSummary.pass_gate.previous_pass_stable.
pass: core
previous_pass_stable: null  # null = core run, no N-1 to check

# Stack — detected by 10-prime from the host project.
stack:
  renderer: pixi
  ui: solidjs
  bundler: vite
  runtime: bun
  testing: vitest
  animation: gsap
  build_cmd: "bun run build"
  test_cmd: "bun test"
  summary: "pixi + solidjs + gsap + bun (vite, vitest)"

# Paths — detected by 10-prime from the host project layout.
paths:
  tests: "tests/"
  modules: "src/modules/"
  core: "src/core/"
  game: "src/game/"
  docs: "docs/"

existing-features:
  - scaffold game contract (setupGame / setupStartScreen stubs — DOM mode placeholder)
  - SolidJS screen flow (loading, start, game, results screens wired)
  - asset coordinator with bundle loading (theme-branding only; no scene bundles yet)
  - game state signals (score, level, reset — SolidJS createSignal)
  - start screen stub (DOM, green background, Play button calls initGpu/loadCore)
  - results screen stub (score display, Play Again / Main Menu buttons)
  - WolfGames Logo DOM overlay at bottom of GameScreen

dom-overlays:
  - element: WolfGamesLogo
    file: src/game/screens/GameScreen.tsx
    position: bottom
    height-px: 24
    css: "absolute bottom-8 left-1/2 -translate-x-1/2"

# Enriched by plan phase (30) — downstream phases read instead of re-deriving
viewport-budget:
  # Owner: 30-plan (per run-context-ownership.md). Do not modify in other phases.
  viewport_height: 844
  viewport_width: 390
  dom_reserved_top: 0
  dom_reserved_bottom: 64    # WolfGames Logo DOM overlay (GameScreen.tsx: bottom-8 = 32px + 24px logo = 56px rounded to 64)
  hud_top_gpu: 48            # Pixi HUD: level text + progress bar (top 48px of canvas)
  game_canvas_available: 780 # 844 - 64 = 780 (GPU canvas fills full viewport; DOM overlays on top)
  play_area_usable: 732      # 780 - 48 = 732 (below HUD top zone)
  platform_zone_px: 253      # 30% of 844 = ~253 px (GDD: platforms bottom 30%)
  runner_pin_x: 97           # 25% of 390 = 97.5 px (runner fixed from left)
  derived_from: "greenfield_defaults"  # basis: prime.carry_forward values + GDD layout spec
